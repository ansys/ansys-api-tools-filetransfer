repos:
- repo: https://github.com/psf/black
  rev: 26.1.0
  hooks:
  - id: black
- repo: https://github.com/pycqa/isort
  rev: 8.0.1
  hooks:
  - id: isort
- repo: https://github.com/pycqa/flake8
  rev: 7.3.0
  hooks:
  - id: flake8
- repo: https://github.com/ansys/pre-commit-hooks
  rev: v0.5.2
  hooks:
  - id: add-license-headers
    args:
    - --start_year=2022
